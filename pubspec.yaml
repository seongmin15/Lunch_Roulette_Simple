name: lunch_roulette_app
description: "점심 룰렛 - 주변 식당을 자동 수집하여 룰렛으로 점심 메뉴를 결정해주는 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  go_router: ^14.8.1
  flutter_dotenv: ^5.2.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - .env
